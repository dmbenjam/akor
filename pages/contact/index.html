<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Contact AKOR Parenting." />
  <title>Contact - AKOR Parenting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../../assets/css/main.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to main content</a>
  <div data-site-header></div>

  <main id="main" class="page-main page-main--with-hero">
    <section class="page-hero" aria-label="Cover image">
      <div
        class="page-hero__media"
        role="img"
        aria-label="Placeholder hero image — contact"
        style="background-image: linear-gradient(rgba(0,0,0,0.15), rgba(0,0,0,0.15)), url('https://images.unsplash.com/photo-1423666639041-f56000c27a9a?auto=format&amp;fit=crop&amp;w=1920&amp;q=80');"
      ></div>
    </section>

    <section class="section-subtle" aria-labelledby="contact-heading">
      <div class="container">
        <div class="page-content">
          <nav class="breadcrumbs" aria-label="Breadcrumb">
            <ol>
              <li><a href="../../index.html">Home</a></li>
              <li><span aria-current="page">Contact</span></li>
            </ol>
          </nav>

          <header class="page-header">
            <h1 id="contact-heading">Contact</h1>
          </header>

          <p class="contact-intro">
            Have a question or want to connect? Send us a message and we will respond as soon as we can.
            You can also email us at <a href="mailto:akorparenting@gmail.com">akorparenting@gmail.com</a>.
          </p>

          <form
            class="contact-form"
            id="page-contact-form"
            novalidate
            aria-describedby="contact-form-hint"
          >
            <p id="contact-form-hint" class="contact-form__hint">
              Fields marked with an asterisk (<span aria-hidden="true">*</span>) are required.
            </p>

            <div class="contact-form__field">
              <label for="pc-name">Name <span class="contact-form__required" aria-hidden="true">*</span></label>
              <input
                id="pc-name"
                name="name"
                type="text"
                autocomplete="name"
                required
                aria-required="true"
              />
            </div>

            <div class="contact-form__field">
              <label for="pc-email">Email <span class="contact-form__required" aria-hidden="true">*</span></label>
              <input
                id="pc-email"
                name="email"
                type="email"
                inputmode="email"
                autocomplete="email"
                required
                aria-required="true"
              />
            </div>

            <div class="contact-form__field">
              <label for="pc-message">Message <span class="contact-form__required" aria-hidden="true">*</span></label>
              <textarea
                id="pc-message"
                name="message"
                rows="6"
                required
                aria-required="true"
              ></textarea>
            </div>

            <button type="submit" class="btn btn-pink">Send message</button>

            <div
              class="contact-form__feedback"
              role="status"
              aria-live="polite"
              hidden
            ></div>
          </form>
        </div>
      </div>
    </section>
  </main>

  <div data-site-footer></div>
  <script src="../../assets/js/shell.js"></script>
  <script>renderSiteShell('../../');</script>
  <script src="../../assets/js/main.js"></script>
</body>
</html>
